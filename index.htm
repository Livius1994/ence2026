<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script
  src="https://cdn.utmify.com.br/scripts/utms/latest.js"
  data-utmify-prevent-xcod-sck
  data-utmify-prevent-subids
  async
  defer
></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verificação Encceja</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #2e7cc3, #1abc9c, #3498db);
      background-size: 600% 600%;
      animation: fundoAnimado 15s ease infinite;
    }

    @keyframes fundoAnimado {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .recaptcha-box {
      background: rgba(255, 255, 255, 0.15);
      padding: 50px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      text-align: center;
    }

    .recaptcha-box a {
      background-color: #ffffff;
      color: #2e7cc3;
      border: none;
      padding: 18px 36px;
      font-size: 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, background 0.3s;
    }

    .recaptcha-box a:hover {
      background-color: #d6ecfa;
      transform: scale(1.05);
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 14px;
      text-align: center;
      color: #ffffffcc;
    }

    footer a {
      color: #ffffffcc;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="recaptcha-box">
    <a href="./inicio/" style="display: inline-block; padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 5px;">
  Não sou um robô e quero prosseguir.
</a>
  </div>

  <footer>
    <a href="#">Política de Privacidade</a> |
    <a href="#">Termos de Uso</a><br/>
    &copy; 2025 Todos os direitos reservados.
  </footer>

</body>
</html>
