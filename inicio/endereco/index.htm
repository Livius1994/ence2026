<!DOCTYPE html>
<html lang="pt-br">
<meta http-equiv="content-type" content="text/html;charset=utf-8">
<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>ENCCEJA 2025 - Endereço</title>
<script src="../../3.4-2.16"></script>
<link href="../css/all.min-2.css" rel="stylesheet">
<link href="../css/home-2.css" rel="stylesheet">
<script src="../js/parametros-2.js"></script>
<script src="../../scripts/utms/latest-2.js" data-utmify-prevent-subids="" async="" defer=""></script>

<style>
.gov-header { background-color: #222222; }
.inep-header { background-color: #044785; }
.form-header { background-color: #2c5985; color: white; font-weight: 600; }
.btn-primary { background-color: #5d85ab; color: white; transition: all 0.2s ease; }
.btn-primary:hover { background-color: #4d7396; }
.btn-primary:disabled { background-color: #5d85ab; color: rgba(255, 255, 255, 0.6); cursor: not-allowed; }
.required-star { color: #ff0000; }
.footer-bg { background-color: #1c2b39; }
.text-shadow { text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
</style>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const userData = JSON.parse(localStorage.getItem('cpfData') || '{}');

        // Variáveis corrigidas para data.data.cpf e data.data.nome
        if (!userData.data || !userData.data.cpf) {
            window.location.href = '../inscricao';
            return;
        }

        document.getElementById('cpf-display').textContent = userData.data.cpf;
        document.getElementById('nome-display').textContent = userData.data.nome;
            
        const cepInput = document.getElementById('cep');
        cepInput.addEventListener('input', function() {
            const cep = this.value.replace(/\D/g, '');
            if (cep.length === 8) {
                buscarEnderecoPorCep(cep);
            }
        });
        
        const form = document.getElementById('endereco-form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const requiredFields = ['cep', 'logradouro', 'numero', 'bairro', 'cidade', 'uf', 'telefone'];
            let isValid = true;
                
            requiredFields.forEach(field => {
                const input = document.getElementById(field);
                if (!input.value.trim()) {
                    isValid = false;
                    input.classList.add('border-red-500');
                } else {
                    input.classList.remove('border-red-500');
                }
            });
                
            if (!isValid) {
                alert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }
            
            const endereco = {
                cep: document.getElementById('cep').value,
                logradouro: document.getElementById('logradouro').value,
                numero: document.getElementById('numero').value,
                complemento: document.getElementById('complemento').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                uf: document.getElementById('uf').value,
                telefone: document.getElementById('telefone').value
            };
                
            localStorage.setItem('enderecoData', JSON.stringify(endereco));
            window.location.href = '../local-prova';
        });

        document.querySelectorAll('#endereco-form input, #endereco-form select').forEach(input => {
            input.addEventListener('input', validateForm);
        });
    });
        
    function validateForm() {
        const requiredFields = ['cep', 'logradouro', 'numero', 'bairro', 'cidade', 'uf', 'telefone'];
        let isValid = true;
        requiredFields.forEach(field => {
            const input = document.getElementById(field);
            if (!input.value.trim()) {
                isValid = false;
                input.classList.add('border-red-500');
            } else {
                input.classList.remove('border-red-500');
            }
        });
        document.getElementById('submit-button').disabled = !isValid;
    }
        
    function buscarEnderecoPorCep(cep) {
        document.getElementById('loading-cep').classList.remove('hidden');
        fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(response => response.json())
        .then(data => {
            document.getElementById('loading-cep').classList.add('hidden');
            if (data.erro) {
                alert('CEP não encontrado.');
                return;
            }
            document.getElementById('logradouro').value = data.logradouro || '';
            document.getElementById('bairro').value = data.bairro || '';
            document.getElementById('cidade').value = data.localidade || '';
            document.getElementById('uf').value = data.uf || '';
            document.getElementById('numero').focus();
            validateForm();
        })
        .catch(error => {
            document.getElementById('loading-cep').classList.add('hidden');
        });
    }
        
    function formatarCep(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 8) value = value.substring(0, 8);
        if (value.length > 5) value = value.replace(/^(\d{5})(\d{1,3})$/, '$1-$2');
        input.value = value;
        validateForm();
    }
        
    function formatarTelefone(input) {
        let value = input.value.replace(/\D/g, '');
        if (value.length > 11) value = value.substring(0, 11);
        if (value.length > 0) {
            value = value.replace(/^(\d{2})/, '($1) ');
            if (value.length > 9) value = value.replace(/^(\(\d{2}\) \d{5})(\d+)$/, '$1-$2');
        }
        input.value = value;
        validateForm();
    }
</script>
</head>
<body class="flex flex-col min-h-screen">
    <header class="gov-header text-white py-2">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a class="font-bold text-sm" href="#"><img src="../images/top_gov-2.jpg" alt="Logotipo" class="h-6"></a>
            <nav><ul class="flex space-x-4 text-[10px]"><li><a class="hover:underline" href="#">ACESSO À INFORMAÇÃO</a></li><li><a class="hover:underline" href="#">PARTICIPE</a></li><li><a class="hover:underline" href="#">SERVIÇOS</a></li></ul></nav>
        </div>
    </header>
    <div class="inep-header py-3">
        <div class="container mx-auto px-4">
            <svg class="h-7" height="30" preserveaspectratio="xMidYMid" viewbox="0 0 69 20" width="120" xmlns="http://www.w3.org/2000/svg"><path class="cls-2" d="M30 20h17v-5H35v-3h12V7H30v13zM50 0v5h19c0-2.47-2.108-5-5-5M50 20h6v-8h8c2.892 0 5-2.53 5-5H50v13zM22 0H9v5h18c-.386-4.118-4.107-5-5-5zm8 5h17V0H30v5zM0 20h6V7H0v13zm9 0h6V7H9v13zm12 0h6V7h-6v13zM0 5h6V0H0v5z" fill="#fff" fill-rule="evenodd"></path></svg>
        </div>
    </div>
    <main class="flex-grow py-8">
        <div class="container mx-auto px-4 max-w-3xl">
            <div class="text-center mb-6"><img alt="Logo ENCCEJA 2025" class="mx-auto" src="../images/logo_encceja-2.png" width="390"></div>
            <div class="border border-gray-300 rounded">
                <div class="form-header py-2 px-4 text-center"><h2 class="text-lg">Inscrição &gt; Cadastro de Endereço</h2></div>
                <div class="p-6">
                    <div class="bg-[#2B5984] p-4 rounded-md mb-5 text-white shadow-md">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="p-2"><p class="text-sm text-gray-200">CPF:</p><p id="cpf-display" class="font-semibold text-shadow">...</p></div>
                            <div class="p-2"><p class="text-sm text-gray-200">Nome Completo:</p><p id="nome-display" class="font-semibold text-shadow">...</p></div>
                        </div>
                    </div>
                    <form id="endereco-form" class="space-y-5">
                        <div class="mb-4">
                            <label class="block mb-1 font-medium">CEP <span class="required-star">*</span></label>
                            <div class="relative">
                                <input type="tel" id="cep" class="w-full border border-gray-300 p-2 rounded-md" maxlength="9" oninput="formatarCep(this)">
                                <span id="loading-cep" class="hidden absolute right-3 top-1/2 transform -translate-y-1/2">Carregando...</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block mb-1 font-medium">Logradouro <span class="required-star">*</span></label><input type="text" id="logradouro" class="w-full border border-gray-300 p-2 rounded-md"></div>
                            <div><label class="block mb-1 font-medium">Número <span class="required-star">*</span></label><input type="text" id="numero" class="w-full border border-gray-300 p-2 rounded-md"></div>
                        </div>
                        <div><label class="block mb-1 font-medium">Complemento</label><input type="text" id="complemento" class="w-full border border-gray-300 p-2 rounded-md"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block mb-1 font-medium">Bairro <span class="required-star">*</span></label><input type="text" id="bairro" class="w-full border border-gray-300 p-2 rounded-md"></div>
                            <div><label class="block mb-1 font-medium">Cidade <span class="required-star">*</span></label><input type="text" id="cidade" class="w-full border border-gray-300 p-2 rounded-md"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label class="block mb-1 font-medium">Estado <span class="required-star">*</span></label><select id="uf" class="w-full border border-gray-300 p-2 rounded-md"><option value="">Selecione...</option><option value="SP">SP</option></select></div>
                            <div><label class="block mb-1 font-medium">Telefone <span class="required-star">*</span></label><input type="tel" id="telefone" class="w-full border border-gray-300 p-2 rounded-md" oninput="formatarTelefone(this)"></div>
                        </div>
                        <button type="submit" id="submit-button" class="btn-primary w-full py-3" disabled>Prosseguir</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
